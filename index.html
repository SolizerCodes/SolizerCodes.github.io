<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hallo Elli</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #00ff88;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    #container {
      width: 100%;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    #chat {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .message {
      max-width: 85%;
      padding: 14px 18px;
      border: 1px solid #00ff88;
      color: #00ff88;
      background: rgba(0, 255, 136, 0.04);
      text-shadow: 0 0 6px #00ff88;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.left {
      align-self: flex-start;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    #controls {
      margin-top: 24px;
    }

    button {
      background: transparent;
      border: 1px solid #00ff88;
      color: #00ff88;
      font-family: "Courier New", monospace;
      font-size: 1rem;
      padding: 10px 18px;
      cursor: pointer;
    }

    button:hover {
      background: #00ff88;
      color: #000;
    }

    @media (max-width: 600px) {
      body {
        padding: 24px 14px;
      }

      .message {
        max-width: 100%;
        font-size: 1rem;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="chat"></div>

    <div id="controls">
      <button id="nextButton">Press</button>
    </div>
  </div>

  <script>
    const texts = [
      "Hallo Elli.",
      "Ich wusste nicht, wie ich dir schreiben sollte.",
      "Deshalb habe ich mir gedacht, ich mache, was ein Informatiker machen würde.",
      "Also hier sind wir."
    ];

    let index = 0;
    let isTyping = false;

    const chat = document.getElementById("chat");
    const button = document.getElementById("nextButton");

    function typeMessage(element, text, i = 0) {
      if (i < text.length) {
        element.innerHTML = text.substring(0, i + 1) + '<span class="cursor">|</span>';
        setTimeout(() => typeMessage(element, text, i + 1), 40);
      } else {
        element.textContent = text;
        isTyping = false;

        if (index === texts.length - 1) {
          button.style.display = "none";
        }
      }
    }

    function addMessage() {
      if (isTyping || index >= texts.length) return;

      isTyping = true;

      const message = document.createElement("div");
      message.className = "message left";
      chat.appendChild(message);

      typeMessage(message, texts[index]);
      index++;

      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    }

    addMessage();

    button.addEventListener("click", addMessage);
  </script>
</body>
</html>
