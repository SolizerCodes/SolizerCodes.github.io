<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hallo Elli</title>

    <style>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #FCEEF7, #BF9BBF);
      color: #2B1225;
      font-family: "Courier New", monospace;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    #container {
      width: 700px;
      max-width: 90%;
    }

    #text {
      font-size: 1.4rem;
      line-height: 1.6;
      min-height: 80px;
      text-shadow: 0 0 6px #2B1225;
    }

    /* FINAL MESSAGE */
    .final {
      border: 2px solid #2B1225;
      background: rgba(74, 32, 64, 0.08);
      padding: 18px;
      font-size: 1.6rem;
      font-weight: bold;
      text-shadow: 0 0 12px #2B1225;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 5px #2B1225; }
      50% { box-shadow: 0 0 18px #2B1225; }
      100% { box-shadow: 0 0 5px #2B1225; }
    }

    /* CURSOR */
    .cursor {
      display: inline-block;
      width: 10px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* BUTTON */
    button {
      margin-top: 30px;
      background: transparent;
      border: 1px solid #2B1225;
      color: #2B1225;
      font-family: "Courier New", monospace;
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      background: #2B1225;
      color: #FCEEF7;
      box-shadow: 0 0 10px rgba(74, 32, 64, 0.35);
    }

    </style>
  </head>

  <body>

    <div id="container">
      <div id="text"></div>
      <button id="nextButton">Weiter</button>
    </div>

  <script>

  const texts = [
    "Hallo Elli.",
    "Ich habe in letzter Zeit ein bisschen über uns nachgedacht.",
    "Keine Sorge, nichts Dramatisches.",
    "Eher so dieses typische Overthinking, das man manchmal hat.",
    "Vor allem nach allem, was wir so besprochen haben.",
    "Und ich glaube, ich habe für mich ein paar Dinge verstanden.",
    "Ich weiß, dass das mit uns nichts in die Richtung wird.",
    "Und ehrlich gesagt ist das auch völlig okay für mich.",
    "Ich wollte nur nicht so tun, als wäre einfach alles wie vorher.",
    "Dafür denke ich zu viel nach.",
    "Aber gleichzeitig wäre es echt schade, wenn wir uns jetzt irgendwie verlieren würden.",
    "Ich mag dich einfach als Person.",
    "Und ich mag die Zeit mit dir.",
    "Deshalb würde ich es schön finden, wenn wir das einfach entspannt weiterlaufen lassen.",
    "Ohne komische Stimmung oder Druck.",
    "Einfach normal.",
    "Also… so normal, wie wir halt sind."
  ];

  let index = 0;
  let isTyping = false;

  const textElement = document.getElementById("text");
  const button = document.getElementById("nextButton");

  function typeText(text, i = 0) {

    if (i === 0) {
      textElement.innerHTML = "";
      isTyping = true;
      button.disabled = true;
    }

    if (i < text.length) {
      textElement.innerHTML = text.substring(0, i + 1) + '<span class="cursor">|</span>';
      setTimeout(() => typeText(text, i + 1), 20);
    } else {
      textElement.innerHTML = text + '<span class="cursor">|</span>';
      isTyping = false;
      button.disabled = false;

      // FINAL STATE after typing last text
      if (index === texts.length - 1) {
        textElement.classList.add("final");
        button.style.display = "none";
      }
    }

  }

  function showText() {
    textElement.classList.remove("final");
    typeText(texts[index]);
  }

  showText();

  button.addEventListener("click", () => {

    if (isTyping) return;

    index++;

    if (index < texts.length) {
      showText();
    }

  });

  </script>

  </body>
</html>
