<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hallo Temp</title>

<style>

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  background: black;
  color: #00ff88;
  font-family: "Courier New", monospace;

  display: flex;
  align-items: center;
  justify-content: center;
}

#container {
  width: 700px;
  max-width: 90%;
}

#text {
  font-size: 1.4rem;
  line-height: 1.6;
  min-height: 80px;
  text-shadow: 0 0 6px #00ff88;
}

/* FINAL MESSAGE STYLE */
.final {
  border: 2px solid #00ff88;
  background: rgba(0, 255, 136, 0.12);
  padding: 18px;
  font-size: 1.6rem;
  font-weight: bold;
  text-shadow: 0 0 12px #00ff88;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 5px #00ff88; }
  50% { box-shadow: 0 0 18px #00ff88; }
  100% { box-shadow: 0 0 5px #00ff88; }
}

.cursor {
  display: inline-block;
  width: 10px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}

button {
  margin-top: 30px;
  background: transparent;
  border: 1px solid #00ff88;
  color: #00ff88;
  font-family: "Courier New", monospace;
  padding: 10px 18px;
  cursor: pointer;
}

button:hover {
  background: #00ff88;
  color: black;
}

</style>
</head>

<body>

<div id="container">
  <div id="text"></div>
  <button id="nextButton">Press</button>
</div>

<script>

const texts = [
  "Hallo Elli.",
  "Ich wusste nicht, wie ich dir schreiben sollte.",
  "Deshalb habe ich mir gedacht, ich mache, was ein Informatiker machen würde.",
  "Test 1",
  "Test 2",
  "Test 3",
  "Test 4",
  "Test 5",
  "Also hier sind wir."
];

let index = 0;

const textElement = document.getElementById("text");
const button = document.getElementById("nextButton");

function typeText(text, i = 0) {

  if (i === 0) {
    textElement.innerHTML = "";
  }

  if (i < text.length) {
    textElement.innerHTML = text.substring(0, i + 1) + '<span class="cursor">|</span>';
    setTimeout(() => typeText(text, i + 1), 10);
  } else {
    textElement.innerHTML = text + '<span class="cursor">|</span>';
  }

}

function showText() {

  if (index === texts.length - 1) {
    textElement.classList.add("final");
    button.style.display = "none";
  } else {
    textElement.classList.remove("final");
  }

  typeText(texts[index]);

}

showText();

button.addEventListener("click", () => {
  index++;
  if (index < texts.length) {
    showText();
  }
});

</script>

</body>
</html>
